<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>let & const</title>
<script>
function varTest() {
    var x = 31;
    
    if (true) {
        var x = 71;  // same variable!
        console.log(x);  // 71
    }
    
    console.log(x);  // 71
}

function letTest() {
    let x = 31;
    
    if (true) {
        let x = 71;  // different variable
        console.log(x);  // 71
    }
    
    console.log(x);  // 31
}

varTest()
letTest()


const MY_NUMBER = 1;
//MY_NUMBER = 2; // Assignment Error
//const MY_NUMBER = 2; // Declare Error

</script>
</head>
<body>

</body>
</html>
